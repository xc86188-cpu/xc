name: Deploy To Tencent COS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-cos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      COS_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
      COS_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
      COS_BUCKET: ${{ secrets.TENCENT_COS_BUCKET }}
      COS_REGION: ${{ secrets.TENCENT_COS_REGION }}
      COS_PATH_PREFIX: ${{ secrets.TENCENT_COS_PATH_PREFIX }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Required Secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for key in COS_SECRET_ID COS_SECRET_KEY COS_BUCKET COS_REGION; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing secret: ${key}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare Deploy Folder
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_DIR="$RUNNER_TEMP/site-dist"
          mkdir -p "$DEPLOY_DIR"

          rsync -av --delete \
            --exclude=".git/" \
            --exclude=".github/" \
            --exclude="deploy/" \
            --exclude="*.md" \
            --exclude="*.sql" \
            --exclude="*.ps1" \
            --exclude="*.py" \
            --exclude="*.zip" \
            --exclude="*.docx" \
            --exclude="*.rtf" \
            --exclude="*.xlsx" \
            ./ "$DEPLOY_DIR"/

          echo "DEPLOY_DIR=$DEPLOY_DIR" >> "$GITHUB_ENV"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install COSCMD
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install coscmd
          coscmd -v

      - name: Configure COSCMD
        shell: bash
        run: |
          set -euo pipefail
          coscmd config \
            -a "$COS_SECRET_ID" \
            -s "$COS_SECRET_KEY" \
            -b "$COS_BUCKET" \
            -r "$COS_REGION"

      - name: Upload To COS
        shell: bash
        run: |
          set -euo pipefail
          TARGET_PATH="${COS_PATH_PREFIX:-/}"
          if [ "$TARGET_PATH" = "" ]; then
            TARGET_PATH="/"
          fi
          if [[ "$TARGET_PATH" != /* ]]; then
            TARGET_PATH="/$TARGET_PATH"
          fi
          if [ "$TARGET_PATH" != "/" ]; then
            TARGET_PATH="${TARGET_PATH%/}/"
          fi

          echo "Uploading '$DEPLOY_DIR' to 'cos://${COS_BUCKET}${TARGET_PATH}'"
          coscmd upload -rs --delete "$DEPLOY_DIR" "$TARGET_PATH"
          echo "Deploy finished."
